# Log-scrubbing regex patterns.
#
# Used by:
#   - Trace pipelines (Langfuse): scrub before storage per §04 Data &
#     Privacy Security ("No PII, secrets, or sensitive data in trace
#     logs — log scrubbing implemented").
#   - Coaching diff CI check: any match on a coaching-note diff REJECTS
#     the coaching event (per /security/coaching-review-checklist.md).
#   - PR Anti-Drift gate: scan diff for matches; flag for human review.
#
# Format:
#   id              — stable pattern id
#   description     — what it catches
#   pattern         — POSIX-extended-compatible regex (works with grep -E,
#                     ripgrep, JS RegExp). Quote literally; tooling tests
#                     in /security/log-scrubbing/test-cases.md verify.
#   severity        — high | medium (drives behavior on match)
#   replacement     — what to substitute for matched text
#   notes           — caveats, false-positive risks
#
# Coverage classes (per §04 enumeration):
#   API keys / tokens (high) | OAuth / JWT (high) | Connection strings (high)
#   Credit cards / SSNs (high) | Email addresses (medium, PII)
#   Phone numbers (medium, PII) | Internal hostnames (medium)
#   Private IPs (medium)

patterns:

  # -------------------------------------------------------------------
  # API keys and provider-specific tokens
  # -------------------------------------------------------------------

  - id: aws-access-key-id
    description: AWS access key ID (AKIA + 16 alphanumeric)
    pattern: '\bAKIA[0-9A-Z]{16}\b'
    severity: high
    replacement: '[REDACTED:aws-access-key-id]'
    notes: AWS-issued access key IDs always start with AKIA.

  - id: aws-secret-access-key
    description: AWS secret access key (40 base64-ish chars)
    pattern: '(?i)aws[_-]?secret[_-]?(access[_-]?)?key[\"'':= ]+([A-Za-z0-9/+=]{40})'
    severity: high
    replacement: '[REDACTED:aws-secret]'
    notes: |
      Anchored to a labeled context to reduce false positives. Bare
      40-char base64 strings are too noisy to flag without context.

  - id: github-token
    description: GitHub personal access token (ghp_) or OAuth token (gho_)
    pattern: '\b(ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{36,}\b'
    severity: high
    replacement: '[REDACTED:github-token]'

  - id: anthropic-api-key
    description: Anthropic API key (sk-ant- prefix)
    pattern: '\bsk-ant-[A-Za-z0-9_-]{20,}\b'
    severity: high
    replacement: '[REDACTED:anthropic-api-key]'

  - id: openai-api-key
    description: OpenAI API key (sk- prefix, ≥40 chars after)
    pattern: '\bsk-[A-Za-z0-9_-]{40,}\b'
    severity: high
    replacement: '[REDACTED:openai-api-key]'
    notes: |
      Generic sk- prefix; intentionally broader. May match other
      providers using the same convention — that is the desired
      behavior for log scrubbing.

  - id: stripe-api-key
    description: Stripe API key (sk_live_, sk_test_, rk_live_, rk_test_)
    pattern: '\b(sk|rk)_(live|test)_[A-Za-z0-9]{24,}\b'
    severity: high
    replacement: '[REDACTED:stripe-key]'

  - id: slack-token
    description: Slack token (xox prefix)
    pattern: '\bxox[abprs]-[A-Za-z0-9-]{10,}\b'
    severity: high
    replacement: '[REDACTED:slack-token]'

  - id: google-api-key
    description: Google API key (AIza prefix, 35 chars)
    pattern: '\bAIza[0-9A-Za-z_-]{35}\b'
    severity: high
    replacement: '[REDACTED:google-api-key]'

  # -------------------------------------------------------------------
  # OAuth / JWT
  # -------------------------------------------------------------------

  - id: bearer-token
    description: HTTP Bearer token in Authorization header
    pattern: '(?i)authorization:\s*bearer\s+[A-Za-z0-9._~+/=-]+'
    severity: high
    replacement: 'authorization: bearer [REDACTED]'

  - id: jwt-token
    description: JSON Web Token (header.payload.signature, base64url)
    pattern: '\beyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b'
    severity: high
    replacement: '[REDACTED:jwt]'

  # -------------------------------------------------------------------
  # Connection strings
  # -------------------------------------------------------------------

  - id: postgres-uri
    description: Postgres connection URI with credentials
    pattern: '\bpostgres(ql)?://[^:\s]+:[^@\s]+@[^/\s]+/\S+'
    severity: high
    replacement: 'postgres://[REDACTED]:[REDACTED]@[host]/[db]'

  - id: mysql-uri
    description: MySQL connection URI with credentials
    pattern: '\bmysql://[^:\s]+:[^@\s]+@[^/\s]+/\S+'
    severity: high
    replacement: 'mysql://[REDACTED]:[REDACTED]@[host]/[db]'

  - id: mongodb-uri
    description: MongoDB connection URI with credentials
    pattern: '\bmongodb(\+srv)?://[^:\s]+:[^@\s]+@[^/\s]+'
    severity: high
    replacement: 'mongodb://[REDACTED]:[REDACTED]@[host]'

  - id: redis-uri
    description: Redis connection URI with credentials
    pattern: '\bredis(s)?://[^:\s]*:[^@\s]+@[^/\s]+'
    severity: high
    replacement: 'redis://[REDACTED]@[host]'

  # -------------------------------------------------------------------
  # Generic high-entropy secret patterns (catch-all)
  # -------------------------------------------------------------------

  - id: labeled-secret-assignment
    description: Variable labeled like a secret, with a value
    pattern: '(?i)(api[_-]?key|secret|password|passwd|token)[\"'':= ]+[\"'']?([A-Za-z0-9/+=_-]{16,})[\"'']?'
    severity: high
    replacement: '\1=[REDACTED]'
    notes: |
      Catches things like `api_key="..."`, `secret: ...`, `password=...`.
      Prone to false positives in narrative text — use only on log fields
      identified as values, not freeform text.

  # -------------------------------------------------------------------
  # PII — financial
  # -------------------------------------------------------------------

  - id: credit-card-number
    description: Credit card number (Visa/MC/Amex/Discover, 13-19 digits)
    pattern: '\b(?:\d[ -]?){13,19}\b'
    severity: high
    replacement: '[REDACTED:cc]'
    notes: |
      Regex is approximate (no Luhn check). Will match phone numbers
      and tracking numbers — accept the false-positive cost; redaction
      is fail-closed.

  - id: ssn-us
    description: US Social Security Number (NNN-NN-NNNN)
    pattern: '\b(?!000|666|9\d{2})\d{3}-(?!00)\d{2}-(?!0000)\d{4}\b'
    severity: high
    replacement: '[REDACTED:ssn]'

  - id: iban
    description: International Bank Account Number (basic IBAN format)
    pattern: '\b[A-Z]{2}\d{2}[A-Z0-9]{11,30}\b'
    severity: high
    replacement: '[REDACTED:iban]'
    notes: |
      Excludes most country prefixes; tune per geography in regional
      deployments.

  # -------------------------------------------------------------------
  # PII — contact
  # -------------------------------------------------------------------

  - id: email-address
    description: Email address (PII)
    pattern: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'
    severity: medium
    replacement: '[REDACTED:email]'
    notes: |
      Medium severity because emails are also legitimate identifiers in
      many internal contexts (e.g., issue assignees). Consumer of the
      pattern decides whether to scrub or just flag.

  - id: phone-us-international
    description: US-format or international phone number
    pattern: '\+?\d{1,3}[ .-]?\(?\d{3}\)?[ .-]?\d{3}[ .-]?\d{4}\b'
    severity: medium
    replacement: '[REDACTED:phone]'
    notes: |
      High false-positive rate against arbitrary numeric strings. Use
      with surrounding context (e.g., "phone: ..." labels) when possible.

  # -------------------------------------------------------------------
  # Internal infrastructure leakage
  # -------------------------------------------------------------------

  - id: internal-hostname
    description: Internal hostname (.internal, .corp, .local)
    pattern: '\b[A-Za-z0-9-]+\.(internal|corp|local|lan|home)\b'
    severity: medium
    replacement: '[REDACTED:internal-host]'

  - id: private-ipv4
    description: Private IPv4 address (RFC 1918) — internal infra leakage
    pattern: '\b(10|172\.(1[6-9]|2[0-9]|3[01])|192\.168)\.\d{1,3}\.\d{1,3}\b'
    severity: medium
    replacement: '[REDACTED:private-ip]'
    notes: |
      Public IPs are not redacted by this rule. Add a separate rule if
      production deployment IPs must also be redacted.

  - id: kubernetes-secret-yaml
    description: Inline base64 secret in a Kubernetes Secret manifest
    pattern: '(?im)^\s*(token|password|api[_-]?key|secret):\s*[A-Za-z0-9+/=]{20,}\s*$'
    severity: high
    replacement: '\1: [REDACTED]'

# Test cases for these patterns live in /security/log-scrubbing/test-cases.md.
# Add a row there for every pattern; quarterly re-run is a §04 obligation.
